{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Acortador{% endblock %} · moisesvalero</title>
  <link rel="stylesheet" href="{% static 'output.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-[#0A0A0A] text-[#E5E5E5] font-sans antialiased min-h-screen flex flex-col">
  {% block content %}{% endblock %}
  <footer class="mt-auto py-8 text-center text-[#555] text-sm border-t border-[#1A1A1A]">
    <p>hecho por <a href="https://moisesvalero.es" class="text-[#C6FF00] hover:underline">moises valero</a></p>
  </footer>
</body>
</html>
