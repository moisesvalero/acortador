<div
  class="bg-surface-container/30 backdrop-blur-md border border-white/5 rounded-xl py-3 px-4 flex flex-col sm:flex-row items-center justify-between gap-4 group hover:border-white/10 transition-all animate-fade-in"
>
  <div class="flex flex-col gap-0.5 w-full sm:w-auto text-left">
    <a
      href="{% url 'redirect' link.short_code %}"
      class="font-mono-label text-mono-label text-surface-tint text-sm hover:underline"
      >{{ BASE_URL }}/{{ link.short_code }}</a
    >
    <span
      class="text-on-surface-variant/40 font-body-sm text-[11px] truncate max-w-[250px] sm:max-w-xs md:max-w-md"
      >{{ link.original_url }}</span
    >
  </div>
  <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
    <div
      class="bg-white/5 px-2 py-1 rounded-md flex items-center gap-1.5 opacity-70"
    >
      <span class="material-symbols-outlined text-xs text-on-surface-variant"
        >visibility</span
      >
      <span class="font-label-sm text-[11px] text-on-surface-variant"
        >{{ link.clicks_count }} clicks</span
      >
    </div>
    <button
      data-copy-url="{{ BASE_URL }}/{{ link.short_code }}"
      class="flex items-center gap-1.5 border border-white/5 hover:bg-white/5 px-3 py-1.5 rounded-lg font-label-sm text-xs transition-all active:scale-95 text-on-background opacity-80 hover:opacity-100"
    >
      Copiar
      <span class="material-symbols-outlined text-xs">content_copy</span>
    </button>
  </div>
</div>
